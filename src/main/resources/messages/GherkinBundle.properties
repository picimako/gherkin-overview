# Settings
g.o.settings.project.configurable.display.name=Gherkin Overview Plugin Settings
g.o.settings.table.column.category=Category
g.o.settings.table.column.tags=Tags
g.o.settings.table.column.mapped.category=Mapped Category
g.o.settings.application.level.mappings.title=Application-level Mappings
g.o.settings.use.project.level.mappings=Use project level category-tag mapping
g.o.settings.project.level.mappings.title=Project-level Mappings
g.o.settings.tags.in.current.project=Tags in the Current Project
g.o.settings.mappings.help.description.gherkin=<h3>Specifying tags</h3>\
  Tags can be specified in two ways:\
  <ul><li>as exact values without the leading @ symbol,</li>\
  <li>as regex patterns starting with the # symbol</li></ul>\
  <h3>Project-level values</h3>\
  When project-level mappings are enabled, mappings extend and override application-level values.<br><br>\
  For specific examples head to the <b>Using project-level mappings</b> section of the project readme.
g.o.settings.mappings.help.description.gherkin.and.jbehave=<h3>Specifying tags</h3>\
  Tags can be specified in the following ways:\
  <ul><li>Gherkin tags as exact values without the leading @ symbol,</li>\
  <li>Story meta names only, as exact values without the leading @ symbol,</li>\
  <li>Story metas with values as [meta-name]:[meta value], without the leading @ symbol and the enclosing brackets,</li>\
  <li>as regex patterns starting with the # symbol</li></ul>\
  <h3>Project-level values</h3>\
  When project-level mappings are enabled, mappings extend and override application-level values.<br><br>\
  For specific examples head to the <b>Using project-level mappings</b> section of the project readme.
g.o.settings.collect.mappings.button.text=Collect Gherkin Tags from Project
g.o.settings.collect.mappings.cannot.collect=Tags cannot be collected while IDE indexing is in progress.
g.o.settings.reset.mappings.name=Reset to default
g.o.settings.reset.mappings.description=Reset mappings to default

