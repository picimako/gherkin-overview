g.o.toolwindow.stats.root.detailed.gherkin={0} - {1} distinct {1,choice,1#tag|2#tags} in {2} .feature {2,choice,1#file|2#files}
g.o.toolwindow.stats.root.simplified.gherkin={0} - {1} {1,choice,1#tag|2#tags}, {2} .feature {2,choice,1#file|2#files}
g.o.toolwindow.stats.root.detailed.story={0} - {1} distinct {1,choice,1#meta|2#metas} in {2} .story {2,choice,1#file|2#files}
g.o.toolwindow.stats.root.simplified.story={0} - {1} {1,choice,1#meta|2#metas}, {2} .story {2,choice,1#file|2#files}
g.o.toolwindow.stats.root.detailed.both={0} - {1} distinct {1,choice,1#item|2#items} in {2} .feature/.story {2,choice,1#file|2#files}
g.o.toolwindow.stats.root.simplified.both={0} - {1} {1,choice,1#item|2#items}, {2} .feature/.story {2,choice,1#file|2#files}

g.o.toolwindow.stats.module.detailed={0} - {1} distinct {1,choice,1#tag|2#tags} in {2} .feature {2,choice,1#file|2#files}
g.o.toolwindow.stats.module.simplified={0} - {1} {1,choice,1#tag|2#tags}, {2} .feature {2,choice,1#file|2#files}
g.o.toolwindow.stats.category.detailed={0} - {1} for {2} distinct {2,choice,1#tag|2#tags}
g.o.toolwindow.stats.tag.detailed={0} - {1} in {2} {2,choice,1#file|2#files}
g.o.toolwindow.stats.feature.file.detailed={0} - {1} {1,choice,1#occurrence|2#occurrences}

